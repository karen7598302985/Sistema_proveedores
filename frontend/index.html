<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Proveedores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #22263a;
      --border:     #2e3350;
      --accent:     #4f6ef7;
      --accent-dim: #2d3f9e;
      --success:    #22c55e;
      --warning:    #f59e0b;
      --danger:     #ef4444;
      --text:       #e8eaf2;
      --muted:      #7c82a0;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'Inter', sans-serif;
      --radius:     10px;
    }

    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #fff;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; }
    header p  { font-size: .8rem; color: var(--muted); }

    .main-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      min-height: calc(100vh - 77px);
    }

    aside {
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 24px;
    }

    .main-content { padding: 28px 32px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .card-header .icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .icon-blue  { background: rgba(79,110,247,.15); }
    .icon-green { background: rgba(34,197,94,.15); }
    .icon-amber { background: rgba(245,158,11,.15); }
    .card-header h2 { font-size: .9rem; font-weight: 600; }
    .card-header p  { font-size: .75rem; color: var(--muted); margin-top: 1px; }
    .card-body { padding: 18px; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: .75rem; font-weight: 500;
      color: var(--muted); letter-spacing: .04em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--sans); font-size: .9rem;
      padding: 8px 12px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,110,247,.15);
    }
    .field select option { background: var(--surface2); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      padding: 9px 18px; border-radius: 7px;
      font-family: var(--sans); font-size: .875rem; font-weight: 500;
      cursor: pointer; border: none; transition: all .18s; width: 100%;
    }
    .btn-primary  { background: var(--accent);  color: #fff; }
    .btn-primary:hover  { background: #3d5be0; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(79,110,247,.3); }
    .btn-outline  { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover  { background: var(--surface2); }
    .btn-danger   { background: rgba(239,68,68,.1); color: var(--danger); border: 1px solid rgba(239,68,68,.2); }
    .btn-danger:hover   { background: rgba(239,68,68,.2); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 9px;
      padding: 22px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 14px;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(79,110,247,.04);
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }
    .upload-zone .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .upload-zone p   { font-size: .8rem; color: var(--muted); }
    .upload-zone strong { font-size: .85rem; color: var(--text); }

    .status-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .8rem; font-weight: 500;
      margin-bottom: 14px;
      border: 1px solid transparent;
    }
    .status-bar.hidden { display: none; }
    .status-pendiente  { background: rgba(124,130,160,.1); border-color: rgba(124,130,160,.2); color: var(--muted); }
    .status-procesando { background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.25); color: var(--warning); }
    .status-completado { background: rgba(34,197,94,.08);  border-color: rgba(34,197,94,.25);  color: var(--success); }
    .status-error      { background: rgba(239,68,68,.08);  border-color: rgba(239,68,68,.25);  color: var(--danger); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-pendiente  { background: var(--muted); }
    .dot-procesando { background: var(--warning); animation: pulse 1.2s infinite; }
    .dot-completado { background: var(--success); }
    .dot-error      { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    #toast-container {
      position: fixed; bottom: 28px; right: 28px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 9999;
    }
    .toast {
      padding: 11px 18px;
      border-radius: 9px;
      font-size: .85rem;
      min-width: 260px; max-width: 360px;
      animation: slideIn .25s ease;
      border: 1px solid transparent;
    }
    .toast.success { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.3); color: var(--success); }
    .toast.error   { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.3); color: var(--danger); }
    .toast.info    { background: rgba(79,110,247,.12); border-color: rgba(79,110,247,.3); color: var(--accent); }
    @keyframes slideIn { from{transform:translateX(40px);opacity:0} to{transform:none;opacity:1} }

    /*  tabla  */
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .table-header h2 { font-size: 1rem; font-weight: 600; }
    .count-badge {
      background: var(--surface2); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
      font-size: .75rem; color: var(--muted); font-family: var(--mono);
    }

    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--surface2); }
    th {
      padding: 10px 14px; text-align: left;
      font-size: .72rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      color: var(--muted); white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 11px 14px; font-size: .86rem;
      border-bottom: 1px solid rgba(46,51,80,.5);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(79,110,247,.04); }
    tbody tr.editing-row { background: rgba(79,110,247,.07) !important; }

    .nit-cell { font-family: var(--mono); font-size: .82rem; color: var(--muted); }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: .73rem; font-weight: 500;
    }
    .badge-manual    { background: rgba(79,110,247,.12); color: #818cf8; border: 1px solid rgba(79,110,247,.2); }
    .badge-auto      { background: rgba(245,158,11,.1);  color: var(--warning); border: 1px solid rgba(245,158,11,.2); }
    .badge-activo    { background: rgba(34,197,94,.1);   color: var(--success); border: 1px solid rgba(34,197,94,.2); }
    .badge-inactivo  { background: rgba(239,68,68,.07);  color: #f87171; border: 1px solid rgba(239,68,68,.15); }

    .btn-edit {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); font-size: .75rem; padding: 4px 10px;
      cursor: pointer; transition: all .15s; font-family: var(--sans);
    }
    .btn-edit:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,110,247,.07); }
    .btn-edit.active { border-color: var(--accent); color: var(--accent); background: rgba(79,110,247,.12); }


    #edit-panel {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 20px;
      display: none;
    }
    #edit-panel.visible { display: block; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
    #edit-panel h3 { font-size: .9rem; font-weight: 600; margin-bottom: 16px; color: var(--accent); }

    .edit-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end; }

   
    .empty-state {
      text-align: center; padding: 52px 20px; color: var(--muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: .88rem; }

   
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); }
      .edit-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!--header  -->
<header>
  <div class="logo-mark">SP</div>
  <div>
    <h1>Sistema de Proveedores</h1>
    <p>Gestión híbrida </p>
  </div>
</header>

<div class="main-grid">

  <aside>

    <div class="card">
      <div class="card-header">
        <div class="icon icon-blue">✏️</div>
        <div>
          <h2>Carga Manual</h2>
          <p>Registro directo desde el formulario</p>
        </div>
      </div>
      <div class="card-body">
        <form id="form-manual" autocomplete="off">
          <div class="field">
            <label>NIT / ID Fiscal</label>
            <input type="text" id="nit" placeholder="900123456-1" required />
          </div>
          <div class="field">
            <label>Nombre de la Empresa</label>
            <input type="text" id="nombre" placeholder="Tech Solutions SAS" required />
          </div>
          <div class="field">
            <label>País</label>
            <input type="text" id="pais" placeholder="Colombia" required />
          </div>
          <div class="field">
            <label>Estado</label>
            <select id="estado">
              <option value="ACTIVO">Activo</option>
              <option value="INACTIVO">Inactivo</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" id="btn-registrar">
            Registrar Proveedor
          </button>
        </form>
      </div>
    </div>

    <!--RPA -->
    <div class="card">
      <div class="card-header">
        <div class="icon icon-amber">🤖</div>
        <div>
          <h2>Carga Automática (RPA)</h2>
          <p>Procesado por el robot externo</p>
        </div>
      </div>
      <div class="card-body">
        <div class="upload-zone" id="upload-zone">
          <input type="file" id="file-input" accept=".csv,.xlsx,.xls" />
          <div class="upload-icon">📂</div>
          <strong id="file-label">Arrastra tu archivo aquí</strong>
          <p>CSV o Excel (.xlsx)</p>
        </div>

        <div class="status-bar hidden" id="status-bar">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">—</span>
        </div>

        <button class="btn btn-primary" id="btn-subir" disabled>
          Enviar al Robot
        </button>
      </div>
    </div>

  </aside>

  <main class="main-content">

    <div class="table-header">
      <h2>Proveedores Registrados</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <span class="count-badge" id="count-badge">— registros</span>
        <button class="btn btn-outline" style="width:auto;padding:6px 14px;font-size:.8rem" onclick="cargarProveedores()">
          ↻ Actualizar
        </button>
      </div>
    </div>

    <div id="edit-panel">
      <h3>✏️ Editando proveedor — <span id="edit-label"></span></h3>
      <div class="edit-grid">
        <div class="field" style="margin:0">
          <label>Nombre de la Empresa</label>
          <input type="text" id="edit-nombre" />
        </div>
        <div class="field" style="margin:0">
          <label>Estado</label>
          <select id="edit-estado">
            <option value="ACTIVO">Activo</option>
            <option value="INACTIVO">Inactivo</option>
          </select>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" style="width:auto;padding:9px 20px" onclick="guardarEdicion()">Guardar</button>
          <button class="btn btn-outline"  style="width:auto;padding:9px 14px" onclick="cancelarEdicion()">✕</button>
        </div>
      </div>
    </div>
    <div class="table-wrap" id="table-wrap">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>Cargando proveedores…</p>
      </div>
    </div>

  </main>
</div>


<div id="toast-container"></div>


<script>
  const API = '';   

  let editandoId   = null;
  let archivoId    = null;
  let pollingTimer = null;
  let fileSelected = false;

  //  Toasts 
  function toast(msg, tipo = 'info', ms = 3500) {
    const t = document.createElement('div');
    t.className = `toast ${tipo}`;
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), ms);
  }

  //tabla 
  async function cargarProveedores() {
    try {
      const r = await fetch(`${API}/api/proveedores`);
      const d = await r.json();
      renderTabla(d.proveedores || []);
    } catch {
      toast('No se pudo conectar al backend.', 'error');
    }
  }

  function renderTabla(proveedores) {
    const wrap = document.getElementById('table-wrap');
    document.getElementById('count-badge').textContent =
      `${proveedores.length} registro${proveedores.length !== 1 ? 's' : ''}`;

    if (!proveedores.length) {
      wrap.innerHTML = `<div class="empty-state">
        <div class="icon">📋</div>
        <p>No hay proveedores registrados aún. Crea el primero desde el formulario.</p>
      </div>`;
      return;
    }

    const rows = proveedores.map(p => {
      const tipoBadge  = p.tipo_carga === 'MANUAL'
        ? '<span class="badge badge-manual">⌨ Manual</span>'
        : '<span class="badge badge-auto">🤖 Automático</span>';
      const estBadge   = p.estado_registro === 'ACTIVO'
        ? '<span class="badge badge-activo">● Activo</span>'
        : '<span class="badge badge-inactivo">○ Inactivo</span>';
      const isEditing  = editandoId === p.id;
      const fecha      = p.fecha_registro ? p.fecha_registro.split('.')[0].replace('T',' ') : '—';
      return `
        <tr id="row-${p.id}" class="${isEditing ? 'editing-row' : ''}">
          <td class="nit-cell">${esc(p.nit_empresa)}</td>
          <td><strong>${esc(p.nombre_empresa)}</strong></td>
          <td>${esc(p.pais)}</td>
          <td>${tipoBadge}</td>
          <td>${estBadge}</td>
          <td style="color:var(--muted);font-size:.78rem;font-family:var(--mono)">${fecha}</td>
          <td>
            <button class="btn-edit ${isEditing ? 'active' : ''}" onclick="iniciarEdicion(${p.id}, '${esc(p.nombre_empresa)}', '${p.estado_registro}')">
              ${isEditing ? 'Editando…' : 'Editar'}
            </button>
          </td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>NIT / ID Fiscal</th>
            <th>Nombre</th>
            <th>País</th>
            <th>Origen</th>
            <th>Estado</th>
            <th>Fecha Registro</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  //  Formulario Manual 
  document.getElementById('form-manual').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btn-registrar');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Registrando…';

    const payload = {
      nit_empresa:     document.getElementById('nit').value.trim(),
      nombre_empresa:  document.getElementById('nombre').value.trim(),
      pais:            document.getElementById('pais').value.trim(),
      estado_registro: document.getElementById('estado').value,
    };

    try {
      const r = await fetch(`${API}/api/proveedores/manual`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const d = await r.json();
      if (r.ok) {
        toast(`✅ Proveedor "${payload.nombre_empresa}" registrado correctamente.`, 'success');
        document.getElementById('form-manual').reset();
        cargarProveedores();
      } else {
        toast(`Error: ${d.detail || 'No se pudo registrar.'}`, 'error');
      }
    } catch {
      toast('Error de conexión con el backend.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Registrar Proveedor';
    }
  });

  //  Upload 
  const fileInput  = document.getElementById('file-input');
  const uploadZone = document.getElementById('upload-zone');
  const fileLabel  = document.getElementById('file-label');
  const btnSubir   = document.getElementById('btn-subir');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileSelected = true;
      fileLabel.textContent = fileInput.files[0].name;
      btnSubir.disabled = false;
      setStatus('hidden', '');
    }
  });

  uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f) { fileInput.files = e.dataTransfer.files; fileLabel.textContent = f.name; fileSelected = true; btnSubir.disabled = false; }
  });

  document.getElementById('btn-subir').addEventListener('click', async () => {
    if (!fileInput.files[0]) return;
    btnSubir.disabled = true;
    btnSubir.innerHTML = '<div class="spinner"></div> Subiendo…';

    const fd = new FormData();
    fd.append('archivo', fileInput.files[0]);

    try {
      const r = await fetch(`${API}/api/proveedores/upload-archivo`, { method: 'POST', body: fd });
      const d = await r.json();
      if (r.ok) {
        archivoId = d.archivo_id;
        toast('📤 Archivo enviado. El robot lo está procesando…', 'info');
        setStatus('procesando', 'El robot está procesando el archivo…');
        iniciarPolling();
      } else {
        toast(`Error: ${d.detail}`, 'error');
        btnSubir.disabled = false;
        btnSubir.textContent = 'Enviar al Robot';
      }
    } catch {
      toast('Error de conexión.', 'error');
      btnSubir.disabled = false;
      btnSubir.textContent = 'Enviar al Robot';
    }
  });

  function iniciarPolling() {
    if (pollingTimer) clearInterval(pollingTimer);
    pollingTimer = setInterval(async () => {
      if (!archivoId) return;
      try {
        const r = await fetch(`${API}/api/proveedores/archivo-estado/${archivoId}`);
        const d = await r.json();
        const estado = d.archivo?.estado || '';

        if (estado === 'COMPLETADO') {
          clearInterval(pollingTimer);
          setStatus('completado', '¡Proceso completado! Proveedores insertados.');
          toast('🎉 El robot terminó. Proveedores cargados correctamente.', 'success', 5000);
          cargarProveedores();
          btnSubir.disabled = false;
          btnSubir.textContent = 'Enviar al Robot';
          archivoId = null;
        } else if (estado === 'ERROR') {
          clearInterval(pollingTimer);
          setStatus('error', 'El robot reportó un error al procesar el archivo.');
          toast('❌ El robot encontró un error al procesar el archivo.', 'error');
          btnSubir.disabled = false;
          btnSubir.textContent = 'Enviar al Robot';
        } else if (estado === 'PROCESANDO') {
          setStatus('procesando', 'El robot está procesando el archivo…');
        } else if (estado === 'PENDIENTE') {
          setStatus('pendiente', 'Archivo en cola, esperando al robot…');
        }
      } catch {  }
    }, 3000);
  }

  function setStatus(tipo, texto) {
    const bar  = document.getElementById('status-bar');
    const dot  = document.getElementById('status-dot');
    const span = document.getElementById('status-text');
    bar.className  = `status-bar status-${tipo}`;
    dot.className  = `status-dot dot-${tipo}`;
    span.textContent = texto;
    if (tipo === 'hidden') bar.classList.add('hidden');
  }

  //edición 
  function iniciarEdicion(id, nombre, estado) {
    editandoId = id;
    document.getElementById('edit-label').textContent   = `#${id} — ${nombre}`;
    document.getElementById('edit-nombre').value        = nombre;
    document.getElementById('edit-estado').value        = estado;
    document.getElementById('edit-panel').classList.add('visible');
    cargarProveedores();
    document.getElementById('edit-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function cancelarEdicion() {
    editandoId = null;
    document.getElementById('edit-panel').classList.remove('visible');
    cargarProveedores();
  }

  async function guardarEdicion() {
    if (!editandoId) return;
    const payload = {
      nombre_empresa:  document.getElementById('edit-nombre').value.trim(),
      estado_registro: document.getElementById('edit-estado').value,
    };
    try {
      const r = await fetch(`${API}/api/proveedores/${editandoId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const d = await r.json();
      if (r.ok) {
        toast('✅ Proveedor actualizado correctamente.', 'success');
        cancelarEdicion();
      } else {
        toast(`Error: ${d.detail || 'No se pudo actualizar.'}`, 'error');
      }
    } catch {
      toast('Error de conexión.', 'error');
    }
  }

  
  cargarProveedores();
  setInterval(cargarProveedores, 8000);  
</script>
</body>
</html>
